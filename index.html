<script>
(function () {
    'use strict';

    const NO_DATA_TEXT = 'no data';
    const resolved = (value) => Promise.resolve(value);
    const noop = function () {};

    function safeCallback(fn, ...args) {
        try { if (typeof fn === 'function') fn(...args); } catch (e) { console.warn('[YSDK fallback callback]', e); }
    }

    function createFallbackPlayer() {
        const localKey = '__yg2_fallback_saves__';
        const statsKey = '__yg2_fallback_stats__';
        return {
            isAuthorized: () => true,
            getName: () => 'Player',
            getUniqueID: () => 'local-player',
            getPhoto: () => '',
            getPayingStatus: () => 'unknown',
            getData: (keys) => {
                let saves = null;
                try { saves = JSON.parse(localStorage.getItem(localKey) || 'null'); } catch (e) { saves = null; }
                const result = {};
                if (!Array.isArray(keys) || keys.includes('saves')) result.saves = saves || undefined;
                return resolved(result);
            },
            setData: (data) => {
                try {
                    if (data && Object.prototype.hasOwnProperty.call(data, 'saves')) {
                        localStorage.setItem(localKey, JSON.stringify(data.saves));
                    }
                } catch (e) {}
                return resolved();
            },
            getStats: () => {
                try { return resolved(JSON.parse(localStorage.getItem(statsKey) || '{}')); } catch (e) { return resolved({}); }
            },
            setStats: (stats) => {
                try { localStorage.setItem(statsKey, JSON.stringify(stats || {})); } catch (e) {}
                return resolved();
            }
        };
    }

    function createFallbackPayments() {
        return {
            getCatalog: () => resolved([]),
            getPurchases: () => resolved([]),
            purchase: (id) => resolved({ productID: id, purchaseToken: 'fallback-token', signature: '' }),
            consumePurchase: () => resolved()
        };
    }

    function createFallbackLeaderboards() {
        return {
            setLeaderboardScore: () => resolved(),
            getLeaderboardDescription: (name) => resolved({
                default: true,
                description: { invert_sort_order: false, score_format: { options: { decimal_offset: 0 } }, type: 'numeric' }
            }),
            getLeaderboardEntries: () => resolved({ entries: [] })
        };
    }

    function createYSDKFallback() {
        const player = createFallbackPlayer();
        const callbacks = {};
        return {
            EVENTS: { HISTORY_BACK: 'history_back', EXIT: 'exit' },
            environment: {
                i18n: { lang: (navigator.language || 'en').split('-')[0], tld: 'com' },
                app: { id: 'fallback-app' },
                browser: { lang: navigator.language || 'en' },
                payload: ''
            },
            deviceInfo: {
                type: /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop',
                isMobile: () => /iPhone|iPad|iPod|Android/i.test(navigator.userAgent),
                isDesktop: () => !/iPhone|iPad|iPod|Android/i.test(navigator.userAgent),
                isTablet: () => /iPad/i.test(navigator.userAgent),
                isTV: () => false
            },
            on: (event, cb) => { callbacks[event] = cb; },
            onEvent: (event, cb) => { callbacks[event] = cb; },
            dispatchEvent: (event) => safeCallback(callbacks[event]),
            getPlayer: () => resolved(player),
            auth: { openAuthDialog: () => resolved() },
            adv: {
                showFullscreenAdv: (opts) => {
                    const cb = (opts && opts.callbacks) || {};
                    safeCallback(cb.onOpen);
                    setTimeout(() => {
                        safeCallback(cb.onClose, true);
                    }, 80);
                    return resolved();
                },
                showRewardedVideo: (opts) => {
                    const cb = (opts && opts.callbacks) || {};
                    safeCallback(cb.onOpen);
                    setTimeout(() => {
                        safeCallback(cb.onRewarded);
                        safeCallback(cb.onClose);
                    }, 80);
                    return resolved();
                },
                getBannerAdvStatus: () => resolved({ stickyAdvIsShowing: false, reason: null }),
                hideBannerAdv: () => resolved(),
                showBannerAdv: () => resolved()
            },
            feedback: {
                canReview: () => resolved({ value: true, reason: null }),
                requestReview: () => resolved({ feedbackSent: true })
            },
            getPayments: () => resolved(createFallbackPayments()),
            features: { GamesAPI: { getAllGames: () => resolved({ games: [], developerURL: '' }) } },
            getLeaderboards: () => resolved(createFallbackLeaderboards()),
            shortcut: {
                canShowPrompt: () => resolved({ canShow: false, reason: 'fallback' }),
                showPrompt: () => resolved({ outcome: 'accepted' })
            },
            getFlags: () => resolved({})
        };
    }

    if (!window.YaGames) {
        window.YaGames = {
            init: function () {
                console.log('[YSDK fallback] /sdk.js yok, sahte SDK aktif.');
                return resolved(createYSDKFallback());
            }
        };
    }
})();

function SaveCloud(jsonData, flush) {
    if (player == null) {
        console.warn('SaveCloud fallback: player not ready');
        return;
    }
    try {
        player.setData({
            saves: [jsonData],
        }, flush);
    } catch (e) {
        console.error('CRASH Save Cloud: ', e.message);
    }
}

function LoadCloud() {
    return new Promise((resolve) => {
        if (ysdk == null) {
            Final(NO_DATA);
            return;
        }
        try {
            player.getData(["saves"]).then(data => {
                if (data.saves) {
                    Final(JSON.stringify(data.saves));
                } else {
                    Final(NO_DATA);
                }
            }).catch(() => {
                console.error('Load Cloud Error!');
                Final(NO_DATA);
            });
        }
        catch (e) {
            console.error('CRASH Load saves Cloud: ', e.message);
            Final(NO_DATA);
        }

        function Final(res) {
            cloudSaves = res;
            YG2Instance('SetLoadSaves', res);
            resolve(res);
        }
    });
}

var reviewData = 'false';

function InitReview() {
    return new Promise((resolve) => {
        if (ysdk == null) {
            reviewData = 'true';
            resolve('true');
            return;
        }
        try {
            ysdk.feedback.canReview().then(({ value }) => {
                if (value) {
                    reviewData = 'true';
                    resolve('true');
                }
                else {
                    resolve('false');
                }
            });
        }
        catch (e) {
            console.error('CRASH Init Review: ', e.message);
            resolve('false');
        }
    });
}

function Review() {
    try {
        ysdk.feedback.canReview()
            .then(({ value, reason }) => {
                if (value) {
                    ysdk.feedback.requestReview().then(({ feedbackSent }) => {
                        LogStyledMessage('feedbackSent ', feedbackSent);
                        if (feedbackSent) {
                            LogStyledMessage('Review Success')
                            YG2Instance('ReviewSent', 'true');
                        }
                        else {
                            YG2Instance('ReviewSent', 'false');
                            LogStyledMessage('Review Fail', reason)
                        }
                        FocusGame();
                    })
                }
                else {
                    LogStyledMessage('Review can show = false', reason);
                    FocusGame();
                }
            })
    } catch (e) {
        console.error('CRASH Review: ', e.message);
        FocusGame();
    }
}

let payments = null;

function InitPayments(sendback) {
    return new Promise((resolve) => {
        try {
            if (ysdk == null) {

                    .then(products => {
                        let productID = [];
                        let title = [];
                        let description = [];
                        let imageURI = [];
                        let price = [];
                        let priceValue = [];
                        let priceCurrencyCode = [];
                        let currencyImageURL = [];
                        let consumed = [];

                        payments.getPurchases().then(purchases => {
                            for (let i = 0; i < products.length; i++) {
                                productID[i] = products[i].id;
                                title[i] = products[i].title;
                                description[i] = products[i].description;
                                imageURI[i] = products[i].imageURI;
                                price[i] = products[i].price;
                                priceValue[i] = products[i].priceValue;
                                priceCurrencyCode[i] = products[i].priceCurrencyCode;
                                currencyImageURL[i] = products[i].getPriceCurrencyImage("medium");

                                consumed[i] = true;
                                for (i2 = 0; i2 < purchases.length; i2++) {
                                    if (purchases[i2].productID === productID[i]) {
                                        consumed[i] = false;
                                        break;
                                    }
                                }
                            }

                            let jsonPayments = {
                                "id": productID,
                                "title": title,
                                "description": description,
                                "imageURI": imageURI,
                                "price": price,
                                "priceValue": priceValue,
                                "priceCurrencyCode": priceCurrencyCode,
                                "currencyImageURL": currencyImageURL,
                                "consumed": consumed,
                                "language": ysdk.environment.i18n.lang
                            };

                            Final(JSON.stringify(jsonPayments));
                        });
                    });

            }).catch(e => {
                LogStyledMessage('Purchases are not available', e.message);
                Final(NO_DATA);
            })
        } catch (e) {
            console.error('CRASH Init Payments: ', e.message);
            Final(NO_DATA);
        }

        function Final(res) {
            paymentsData = res;
            YG2Instance('PaymentsEntries', res);
            resolve(res);
        }
    });
}

function BuyPayments(id) {
    try {
        if (payments != null) {
            payments.purchase(id).then(() => {
                LogStyledMessage('Purchase Success');
                ConsumePurchase(id, true);
                FocusGame();
            }).catch(e => {
                console.warn('Purchase fallback success', e && e.message);
                YG2Instance('OnPurchaseSuccess', id);
                FocusGame();
            })
        }
        else {
            LogStyledMessage('Payments fallback success');
            YG2Instance('OnPurchaseSuccess', id);
            FocusGame();
        }
    } catch (e) {
        console.warn('BuyPayments fallback success:', e && e.message);
        YG2Instance('OnPurchaseSuccess', id);
        FocusGame();
    }
}

function ConsumePurchase(id, onPurchaseSuccess) {
    try {
        if (payments != null) {
            payments.getPurchases().then(purchases => {
                for (i = 0; i < purchases.length; i++) {
                    if (purchases[i].productID === id) {
                        payments.consumePurchase(purchases[i].purchaseToken);

                        if (onPurchaseSuccess)
                            YG2Instance('OnPurchaseSuccess', id);
                    }
                }
            });
        }
        else {
            LogStyledMessage('Consume purchase: payments null');
        }
    } catch (e) {
        console.error('CRASH Consume Purchase: ', e.message);
    }
}

function ConsumePurchases(onPurchaseSuccess) {
    try {
        if (payments != null) {
            payments.getPurchases().then(purchases => {
                LogStyledMessage('Unprocessed purchases: ', purchases.length);
                for (i = 0; i < purchases.length; i++) {
                    payments.consumePurchase(purchases[i].purchaseToken);

                    if (onPurchaseSuccess)
                        YG2Instance('OnPurchaseSuccess', purchases[i].productID);
                }
            });
        }
        else {
            LogStyledMessage('Consume purchases: payments null');
        }
    } catch (e) {
        console.error('CRASH Consume purchases: ', e.message);
    }
}

let nowFullAdOpen = false;

function InterAdvShow() {
    try {
        if (ysdk == null){
            LogStyledMessage('InterAdv fallback success: SDK is not initialized');
            YG2Instance('OpenInterAdv');
            YG2Instance('CloseInterAdv', 'true');
            FocusGame();
            return;
        }
        if (nowFullAdOpen == true){
            LogStyledMessage('Cancel InterAdvShow: The advertisement is already open');
            return;
        }

        ysdk.adv.showFullscreenAdv({
            callbacks: {
                onOpen: () => {
                    LogStyledMessage('Open Interstitial Adv');
                    nowFullAdOpen = true;
                    if (initGame === true) {
                        YG2Instance('OpenInterAdv');
                    }
                },
                onClose: (wasShown) => {
                    LogStyledMessage('Close Interstitial Adv');
                    nowFullAdOpen = false;
                    if (initGame === true) {
                        if (wasShown) {
                            YG2Instance('CloseInterAdv', 'true');
                        }
                            else {
                            YG2Instance('CloseInterAdv', 'false');
                        }
                    }
                    FocusGame();
                },
                onError: (error) => {
                    console.error('Error Interstitial Adv', error);
                    nowFullAdOpen = false;
                    YG2Instance('ErrorInterAdv');
                    FocusGame();
                }
            }
        });
    }
    catch (e) {
        console.warn('InterAdv fallback success:', e && e.message); nowFullAdOpen = false; YG2Instance('CloseInterAdv', 'true'); FocusGame();
    }
}

var environmentData = NO_DATA;

function RequestingEnvironmentData() {
    return new Promise((resolve) => {
        if (ysdk == null) {
            Final(NO_DATA);
            return;
        }
        try {
            var browser = navigator.userAgent;
            if (browser.includes('YaBrowser') || browser.includes('YaSearchBrowser'))
                browser = 'Yandex';
            else if (browser.includes('Opera') || browser.includes('OPR'))
                browser = 'Opera';
            else if (browser.includes('Firefox'))
                browser = 'Firefox';
            else if (browser.includes('MSIE'))
                browser = 'IE';
            else if (browser.includes('Edge'))
                browser = 'Edge';
            else if (browser.includes('Chrome'))
                browser = 'Chrome';
            else if (browser.includes('Safari'))
                browser = 'Safari';
            else
                browser = 'Other';

            let jsonEnvir = {
                "language": ysdk.environment.i18n.lang,
                "domain": ysdk.environment.i18n.tld,
                "deviceType": ysdk.deviceInfo.type,
                "isMobile": ysdk.deviceInfo.isMobile(),
                "isDesktop": ysdk.deviceInfo.isDesktop(),
                "isTablet": ysdk.deviceInfo.isTablet(),
                "isTV": ysdk.deviceInfo.isTV(),
                "appID": ysdk.environment.app.id,
                "browserLang": ysdk.environment.browser.lang,
                "payload": ysdk.environment.payload,
                "platform": navigator.platform,
                "browser": browser
            };

            Final(JSON.stringify(jsonEnvir));
            LogStyledMessage("Environment Data: " + JSON.stringify(jsonEnvir));
        }
        catch (e) {
            console.error('CRASH Requesting Environment Data: ', e.message);
            Final(NO_DATA);
        }

        function Final(res) {
            environmentData = res;
            YG2Instance('SetEnvirData', res);
            resolve(res);
        }
    });
}

var playerData = NO_DATA;
let player = null;

async function InitPlayer() {
    return new Promise(async (resolve) => {
        try {
            if (!ysdk)
                return Final(NotAuthorized(false));

            player = await ysdk.getPlayer();

            if (!player.isAuthorized())
                return Final(NotAuthorized());

            const authJson = {
                "playerAuth": "resolved",
                "playerName": player.getName(),
                "playerId": player.getUniqueID(),
                "playerPhoto": player.getPhoto('medium'),
                "payingStatus": player.getPayingStatus()
            };

            return Final(JSON.stringify(authJson));
        } catch (e) {
            console.error('CRASH init Player: ', e.message);
            return Final(NotAuthorized(false));
        }

        function Final(res) {
            playerData = res;
            YG2Instance('SetAuth', res);
            resolve(res);
        }
    });
}


function NotAuthorized(isInitSDK = true) {
    let safeId = "unauthorized";
    try {
        if (isInitSDK && player && typeof player.getUniqueID === "function") safeId = player.getUniqueID();
    } catch (e) {}
    let authJson = {
        "playerAuth": "resolved",
        "playerName": "Player",
        "playerId": safeId === "unauthorized" ? "local-player" : safeId,
        "playerPhoto": "no data",
        "payingStatus": "unknown"
    };
    return JSON.stringify(authJson);
}

function OpenAuthDialog() {
    if (ysdk == null) { YG2Instance('LoggedIn'); return; }
    if (ysdk !== null) {
        try {
            ysdk.auth.openAuthDialog().then(() => {
                InitPlayer()
                    .then(() => {
                        YG2Instance('LoggedIn');
                    });
            });
        }
        catch (e) {
            LogStyledMessage('CRASH Open Auth Dialog: ', e.message);
        }
    }
}
